name: 🚀 Build & Deploy – O2 Switch

# ── Triggers ────────────────────────────────────────────────
on:
  push:
    branches: [main]          # deploy on every push to main
  workflow_dispatch:          # allow manual trigger from GitHub UI

# ── Jobs ────────────────────────────────────────────────────
jobs:
  build-and-deploy:
    name: Build Vite app & FTP to O2 Switch
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout source
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      # 2. Setup Node with npm cache
      - name: 🟢 Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies (clean install = reproducible build)
      - name: 📦 Install dependencies
        run: npm ci

      # 4. Build
      #    VITE_APP_BASE: set as a GitHub Variable (Settings → Variables → Actions)
      #    if your app lives at https://example.com/notys/ set it to "/notys/"
      #    leave unset (or set to "/") for root deployment.
      - name: 🔨 Build
        run: npm run build
        env:
          VITE_APP_BASE: ${{ vars.VITE_APP_BASE || '/' }}

      # 5. Deploy dist/ → O2 Switch via FTP
      #
      #    Required GitHub Secrets (Settings → Secrets → Actions):
      #      FTP_SERVER   – FTP hostname, e.g. ftp.yourdomain.com
      #      FTP_USERNAME – your cPanel / FTP account username
      #      FTP_PASSWORD – your cPanel / FTP account password
      #
      #    Optional GitHub Variable:
      #      FTP_SERVER_DIR – remote path, default /public_html/
      #                       use /public_html/notys/ for sub-directory deploy
      - name: 📡 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server:       ${{ secrets.FTP_SERVER }}
          username:     ${{ secrets.FTP_USERNAME }}
          password:     ${{ secrets.FTP_PASSWORD }}
          local-dir:    ./dist/
          server-dir:   ${{ vars.FTP_SERVER_DIR || '/public_html/' }}
          # Only upload changed files (incremental deploy)
          dangerous-clean-slate: false
          # Exclude source-control artefacts from being uploaded
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      # 6. Summary
      - name: ✅ Deployment summary
        run: |
          echo "### 🎉 Noty's deployed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
