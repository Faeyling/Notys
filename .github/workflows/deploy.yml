name: 🚀 CI – Build check

# ─────────────────────────────────────────────────────────
#  Deployment is handled by Vercel's native GitHub integration.
#  Vercel auto-deploys on every push to `main` with zero config.
#
#  To connect:
#    1. Go to https://vercel.com/new
#    2. Import this GitHub repository
#    3. Vercel auto-detects Vite — no settings to change
#    4. Click Deploy ✓
#
#  Optional env var in Vercel dashboard (Settings → Environment Variables):
#    VITE_APP_BASE = /   (leave as "/" for root deployment)
#
#  This workflow only validates that the build passes on every PR / push.
# ─────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build
        run: npm run build
        env:
          VITE_APP_BASE: ${{ vars.VITE_APP_BASE || '/' }}

      - name: 📊 Bundle size report
        run: |
          echo "### 📦 Bundle sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          du -sh dist/assets/* 2>/dev/null | sort -h >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
